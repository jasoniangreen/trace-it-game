<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#06060f"/>

  <!-- Subtle grid lines -->
  <g stroke="#0d0d1a" stroke-width="2">
    <!-- Vertical -->
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="214" y1="64" x2="214" y2="448"/>
    <line x1="300" y1="64" x2="300" y2="448"/>
    <line x1="386" y1="64" x2="386" y2="448"/>
    <!-- Horizontal -->
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="214" x2="448" y2="214"/>
    <line x1="64" y1="300" x2="448" y2="300"/>
    <line x1="64" y1="386" x2="448" y2="386"/>
  </g>

  <!-- Grid cell highlights (subtle, along path) -->
  <g fill="#0a1628" opacity="0.5">
    <rect x="68" y="68" width="56" height="56" rx="8"/>
    <rect x="154" y="68" width="56" height="56" rx="8"/>
    <rect x="240" y="68" width="56" height="56" rx="8"/>
    <rect x="240" y="154" width="56" height="56" rx="8"/>
    <rect x="240" y="240" width="56" height="56" rx="8"/>
    <rect x="326" y="240" width="56" height="56" rx="8"/>
    <rect x="326" y="326" width="56" height="56" rx="8"/>
    <rect x="326" y="412" width="56" height="56" rx="8"/>
  </g>

  <!-- Path glow layer -->
  <path d="M96 96 L182 96 L268 96 L268 182 L268 268 L354 268 L354 354 L354 440"
        fill="none" stroke="url(#pathGrad)" stroke-width="16" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.4" filter="url(#glowBig)"/>

  <!-- Path main line -->
  <path d="M96 96 L182 96 L268 96 L268 182 L268 268 L354 268 L354 354 L354 440"
        fill="none" stroke="url(#pathGrad)" stroke-width="10" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Start node -->
  <circle cx="96" cy="96" r="22" fill="#00ff88" opacity="0.15"/>
  <circle cx="96" cy="96" r="14" fill="#00ff88" filter="url(#glow)"/>
  <text x="96" y="102" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="#06060f">1</text>

  <!-- End node -->
  <circle cx="354" cy="440" r="22" fill="#00e5ff" opacity="0.15"/>
  <circle cx="354" cy="440" r="14" fill="#00e5ff" filter="url(#glow)"/>
  <text x="354" y="446" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="#06060f">2</text>

  <!-- Wall accent (red bar between two cells) -->
  <rect x="152" y="124" width="60" height="6" rx="3" fill="#ff3355" opacity="0.7" filter="url(#glow)"/>
</svg>
