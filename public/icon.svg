<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStart">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a1a"/>

  <!-- Grid lines -->
  <g stroke="#1a1a3a" stroke-width="1.5" opacity="0.5">
    <line x1="86" y1="42" x2="86" y2="470"/>
    <line x1="172" y1="42" x2="172" y2="470"/>
    <line x1="256" y1="42" x2="256" y2="470"/>
    <line x1="340" y1="42" x2="340" y2="470"/>
    <line x1="426" y1="42" x2="426" y2="470"/>
    <line x1="42" y1="86" x2="470" y2="86"/>
    <line x1="42" y1="172" x2="470" y2="172"/>
    <line x1="42" y1="256" x2="470" y2="256"/>
    <line x1="42" y1="340" x2="470" y2="340"/>
    <line x1="42" y1="426" x2="470" y2="426"/>
  </g>

  <!-- Grid cells (subtle dark fill) -->
  <g fill="#0d0d24" opacity="0.6">
    <rect x="46" y="46" width="76" height="76" rx="10"/>
    <rect x="132" y="46" width="76" height="76" rx="10"/>
    <rect x="218" y="46" width="76" height="76" rx="10"/>
    <rect x="304" y="46" width="76" height="76" rx="10"/>
    <rect x="390" y="46" width="76" height="76" rx="10"/>
    <rect x="46" y="132" width="76" height="76" rx="10"/>
    <rect x="132" y="132" width="76" height="76" rx="10"/>
    <rect x="218" y="132" width="76" height="76" rx="10"/>
    <rect x="304" y="132" width="76" height="76" rx="10"/>
    <rect x="390" y="132" width="76" height="76" rx="10"/>
    <rect x="46" y="218" width="76" height="76" rx="10"/>
    <rect x="132" y="218" width="76" height="76" rx="10"/>
    <rect x="218" y="218" width="76" height="76" rx="10"/>
    <rect x="304" y="218" width="76" height="76" rx="10"/>
    <rect x="390" y="218" width="76" height="76" rx="10"/>
    <rect x="46" y="304" width="76" height="76" rx="10"/>
    <rect x="132" y="304" width="76" height="76" rx="10"/>
    <rect x="218" y="304" width="76" height="76" rx="10"/>
    <rect x="304" y="304" width="76" height="76" rx="10"/>
    <rect x="390" y="304" width="76" height="76" rx="10"/>
    <rect x="46" y="390" width="76" height="76" rx="10"/>
    <rect x="132" y="390" width="76" height="76" rx="10"/>
    <rect x="218" y="390" width="76" height="76" rx="10"/>
    <rect x="304" y="390" width="76" height="76" rx="10"/>
    <rect x="390" y="390" width="76" height="76" rx="10"/>
  </g>

  <!-- Start cell highlight -->
  <rect x="46" y="132" width="76" height="76" rx="10" fill="#0a2a4a" opacity="0.8"/>

  <!--
    T-shape path: starts at (row1, col0), goes right across top to (row1, col4),
    turns down at col3, goes to col3 row1, then center column down.
    Path: (1,0) -> (0,0) -> (0,1) -> (0,2) -> (0,3) -> (0,4) -> (1,4) -> (1,3) -> (1,2) -> (2,2) -> (3,2) -> (4,2)
    Grid coords: col*86+84, row*86+84 (center of each cell)
  -->

  <!-- Path outer glow -->
  <path d="M84 170 L84 84 L170 84 L256 84 L342 84 L428 84 L428 170 L342 170 L256 170 L256 256 L256 342 L256 428"
        fill="none" stroke="url(#pathGrad)" stroke-width="28" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.25" filter="url(#glowBig)"/>

  <!-- Path main line -->
  <path d="M84 170 L84 84 L170 84 L256 84 L342 84 L428 84 L428 170 L342 170 L256 170 L256 256 L256 342 L256 428"
        fill="none" stroke="url(#pathGrad)" stroke-width="16" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner bright line for that double-stroke neon look -->
  <path d="M84 170 L84 84 L170 84 L256 84 L342 84 L428 84 L428 170 L342 170 L256 170 L256 256 L256 342 L256 428"
        fill="none" stroke="#b0ffee" stroke-width="4" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.5"/>

  <!-- Start node glow -->
  <circle cx="84" cy="170" r="28" fill="#00ff88" opacity="0.12" filter="url(#glowStart)"/>
  <rect x="58" y="144" width="52" height="52" rx="10" fill="#0a3a5a" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
</svg>
